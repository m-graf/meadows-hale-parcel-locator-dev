<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Meadows-Hale - Property Map</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        .map-logo-watermark {
            position: absolute;
            top: 16px;
            right: 16px;
            max-width: 120px;
            height: auto;
            opacity: 0.82;
            pointer-events: none;
            z-index: 999;
        }

        .beta-tag {
            position: absolute;
            top: 16px;
            left: 16px;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            color: #667eea;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 999px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
            z-index: 1001;
            transition: background 0.2s, color 0.2s;
        }
        .beta-tag:hover {
            background: #667eea;
            color: white;
        }

        @media (max-width: 768px) {
            .beta-tag {
                top: auto;
                bottom: 90px;
                left: 16px;
            }
        }

        @media (max-width: 600px) {
            .beta-tag {
                bottom: 85px;
                left: 12px;
            }
        }

        .info-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            right: auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            max-width: 320px;
            z-index: 1000;
            overflow: hidden;
            touch-action: manipulation;
        }

        .info-panel-header {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            gap: 12px;
        }

        .info-panel-header h2 {
            font-size: 1.15em;
            color: #333;
            margin: 0;
            flex: 1;
            min-width: 0;
        }

        .locate-link {
            font-size: 0.75em;
            font-weight: normal;
            color: #667eea;
            text-decoration: none;
            margin-left: 6px;
            white-space: nowrap;
        }

        .locate-link:hover {
            text-decoration: underline;
        }

        .info-panel-toggle {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: #f0f0f0;
            color: #666;
            transition: transform 0.25s ease, background 0.2s;
        }

        .info-panel-toggle.open {
            transform: rotate(180deg);
            background: #e8ecff;
            color: #667eea;
        }

        .info-panel-body {
            padding: 14px 18px 18px;
            border-top: 1px solid #eee;
        }

        .info-panel .detail {
            margin: 10px 0;
            font-size: 0.9em;
            color: #666;
        }

        .info-panel .detail strong {
            color: #333;
        }

        .info-panel #creatorInfo {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }

        .parcel-nav-apps {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .parcel-nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            font-size: 0.8em;
            font-weight: 600;
            text-decoration: none;
            color: #667eea;
            background: #f4f5ff;
            border-radius: 8px;
            border: 1px solid #e0e4ff;
            transition: background 0.2s, color 0.2s;
            touch-action: manipulation;
        }

        .parcel-nav-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .new-badge {
            display: inline-block;
            margin-left: 8px;
            padding: 2px 7px;
            font-size: 0.65em;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            vertical-align: middle;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            line-height: 1.2;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(102, 126, 234, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            color: white;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.2em;
            font-weight: 600;
        }

        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
            max-width: 420px;
            text-align: center;
            z-index: 10000;
        }

        .error-message .error-logo {
            display: block;
            width: 100%;
            max-width: 280px;
            height: auto;
            margin: 0 auto 20px;
        }

        .error-message h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.4em;
        }

        .error-message .error-detail {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 24px;
        }

        .error-message .error-contact {
            border-top: 1px solid #eee;
            padding-top: 20px;
            font-size: 0.95em;
            color: #555;
        }

        .error-message .error-contact strong {
            color: #333;
        }

        .error-message .error-contact a {
            color: #667eea;
            text-decoration: none;
        }

        .error-message .error-contact a:hover {
            text-decoration: underline;
        }

        .legend {
            position: absolute;
            bottom: 24px;
            left: 16px;
            background: white;
            padding: 12px 16px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 6px 0;
            font-size: 0.85em;
        }

        .legend-item:first-child { margin-top: 0; }
        .legend-item:last-child { margin-bottom: 0; }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .location-btn {
            position: absolute;
            bottom: 24px;
            right: 16px;
            background: white;
            border: 2px solid #667eea;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            color: #667eea;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            transition: all 0.2s ease;
        }

        .location-btn:hover {
            background: #667eea;
            color: white;
        }

        /* Leaflet defaults on .leaflet-div-icon (white box + border) can hide our HTML dot */
        .leaflet-div-icon.user-marker {
            background: transparent !important;
            border: none !important;
        }

        @media (max-width: 600px) {
            .legend {
                bottom: 20px;
                left: 12px;
                padding: 10px 12px;
            }

            .legend-item { font-size: 0.8em; }
            .legend-color { width: 14px; height: 14px; margin-right: 8px; }

            .location-btn {
                bottom: 20px;
                right: 12px;
                padding: 10px 14px;
                font-size: 0.85em;
            }

        }

        /* Map Style Switcher (hidden for now – remove display:none to restore) */
        .map-style-switcher,
        .map-style-trigger-mobile {
            display: none !important;
        }

        .map-style-switcher {
            position: absolute;
            top: 16px;
            left: 16px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            overflow: hidden;
        }

        .style-switcher-header {
            padding: 12px 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .style-switcher-toggle {
            margin-left: auto;
            transition: transform 0.25s ease;
        }

        .style-switcher-toggle.open {
            transform: rotate(180deg);
        }

        .style-switcher-close {
            display: none;
        }

        .style-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease;
        }

        .style-options.open {
            max-height: 420px;
        }

        .style-option {
            padding: 0;
            border: none;
            background: white;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .style-option:hover {
            background: #f8f9fa;
        }

        .style-option.active {
            background: #e8ecff;
        }

        .style-option.active::after {
            content: '✓';
            position: absolute;
            top: 6px;
            right: 6px;
            background: #667eea;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .style-preview {
            width: 100%;
            height: 70px;
            object-fit: cover;
            display: block;
        }

        .style-label {
            padding: 8px;
            font-size: 0.8em;
            font-weight: 600;
            color: #333;
            text-align: center;
            border-top: 1px solid #eee;
        }

        /* Mobile: Map Style as slide-in panel from the right */
        .map-style-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 1001;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .map-style-backdrop.visible {
            display: block;
            opacity: 1;
        }

        .map-style-trigger-mobile {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            padding: 10px 14px;
            border: none;
            border-radius: 10px;
            background: white;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            font-weight: 600;
            font-size: 0.85em;
            color: #333;
            cursor: pointer;
        }

        .map-style-trigger-mobile:active {
            background: #f0f0f0;
        }

        @media (max-width: 768px) {
            .map-style-trigger-mobile {
                display: block;
            }

            .map-style-switcher {
                top: 0;
                left: auto;
                right: 0;
                width: 280px;
                min-width: 280px;
                height: 100%;
                border-radius: 0;
                box-shadow: -4px 0 20px rgba(0, 0, 0, 0.15);
                transform: translateX(100%);
                transition: transform 0.25s ease;
                overflow-y: auto;
            }

            .map-style-switcher.panel-open {
                transform: translateX(0);
            }

            .map-style-switcher .style-options {
                max-height: none;
                padding: 12px;
                min-width: 0;
            }

            .map-style-switcher .style-option {
                min-width: 0;
            }

            .map-style-switcher .style-preview {
                min-width: 0;
                width: 100%;
            }

            .map-style-switcher .style-options.open {
                max-height: none;
            }

            .style-switcher-toggle {
                display: none;
            }

            .style-switcher-close {
                display: flex;
                margin-left: auto;
                width: 32px;
                height: 32px;
                align-items: center;
                justify-content: center;
                background: rgba(255,255,255,0.2);
                border: none;
                border-radius: 8px;
                color: white;
                font-size: 1.2em;
                cursor: pointer;
                flex-shrink: 0;
            }

            .style-switcher-close:hover {
                background: rgba(255,255,255,0.3);
            }

            .info-panel {
                top: 10px;
                left: 10px;
                right: auto;
                transform: none;
                width: calc(100% - 130px);
                max-width: none;
            }

            .info-panel.collapsed .info-panel-body {
                display: none;
            }

            .info-panel-header {
                padding: 12px 14px;
            }

            .info-panel-header h2 {
                font-size: 1.05em;
            }
        }

        /* Desktop: always show body */
        @media (min-width: 769px) {
            .info-panel .info-panel-body {
                display: block !important;
            }

            .info-panel .info-panel-toggle {
                display: none;
            }
        }

        .leaflet-popup-content-wrapper {
            border-radius: 8px;
        }

        .leaflet-popup-content {
            margin: 15px;
        }

        /* Polygon navigator: only shown when multiple polygons */
        .polygon-nav {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            padding: 10px 14px;
            z-index: 1000;
            display: none;
            align-items: center;
            gap: 12px;
            touch-action: manipulation;
        }

        .polygon-nav.visible {
            display: flex;
        }

        .polygon-nav-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 1.1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .polygon-nav-btn:hover {
            background: #5568d3;
        }

        .polygon-nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .polygon-nav-label {
            font-size: 0.9em;
            font-weight: 600;
            color: #333;
            min-width: 100px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .polygon-nav {
                bottom: 80px;
                padding: 8px 12px;
                gap: 8px;
            }
            .polygon-nav-btn { width: 32px; height: 32px; font-size: 1em; }
            .polygon-nav-label { font-size: 0.85em; min-width: 80px; }
        }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading property data...</div>
    </div>

    <div id="map"></div>

    <a href="#" target="_blank" rel="noopener" class="beta-tag">Beta</a>
    <img src="meadows-hale-logo.png" alt="Meadows-Hale" class="map-logo-watermark" />

    <div class="map-style-backdrop" id="mapStyleBackdrop" aria-hidden="true"></div>
    <button type="button" class="map-style-trigger-mobile" id="mapStyleTriggerMobile" aria-label="Open map style">🗺️ Map Style</button>

    <!-- Map Style Switcher -->
    <div class="map-style-switcher" id="mapStyleSwitcher">
        <div class="style-switcher-header" id="styleSwitcherHeader">
            <span>🗺️ Map Style</span>
            <span class="style-switcher-toggle" id="styleSwitcherToggle" aria-hidden="true">▼</span>
            <button type="button" class="style-switcher-close" id="styleSwitcherClose" aria-label="Close">×</button>
        </div>
        <div class="style-options" id="styleOptions">
            <button class="style-option active" data-style="streets" onclick="changeMapStyle('streets')">
                <svg class="style-preview" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <rect fill="#f0f0f0" width="100" height="100"/>
                    <line x1="10" y1="30" x2="90" y2="30" stroke="#ddd" stroke-width="8"/>
                    <line x1="30" y1="10" x2="30" y2="90" stroke="#ddd" stroke-width="6"/>
                    <circle cx="30" cy="30" r="4" fill="#667eea"/>
                </svg>
                <div class="style-label">Streets</div>
            </button>
            <button class="style-option" data-style="satellite" onclick="changeMapStyle('satellite')">
                <svg class="style-preview" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <pattern id="sat" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
                            <rect fill="#3a5a40" width="20" height="20"/>
                            <circle cx="5" cy="5" r="2" fill="#588157"/>
                        </pattern>
                    </defs>
                    <rect fill="url(#sat)" width="100" height="100"/>
                </svg>
                <div class="style-label">Satellite</div>
            </button>
            <button class="style-option" data-style="terrain" onclick="changeMapStyle('terrain')">
                <svg class="style-preview" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <rect fill="#e8ddb5" width="100" height="100"/>
                    <path fill="#c9b896" d="M0,70 L20,50 L40,60 L60,40 L80,55 L100,45 V100 H0 Z"/>
                </svg>
                <div class="style-label">Terrain</div>
            </button>
            <button class="style-option" data-style="topo" onclick="changeMapStyle('topo')">
                <svg class="style-preview" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <rect fill="#faf9f6" width="100" height="100"/>
                    <ellipse cx="50" cy="50" rx="40" ry="35" fill="none" stroke="#c8a882" stroke-width="1"/>
                    <ellipse cx="50" cy="50" rx="20" ry="15" fill="none" stroke="#a88850" stroke-width="1"/>
                </svg>
                <div class="style-label">Topographic</div>
            </button>
            <button class="style-option" data-style="dark" onclick="changeMapStyle('dark')">
                <svg class="style-preview" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <rect fill="#1a1a1a" width="100" height="100"/>
                    <line x1="10" y1="30" x2="90" y2="30" stroke="#444" stroke-width="6"/>
                    <circle cx="30" cy="30" r="4" fill="#667eea"/>
                </svg>
                <div class="style-label">Dark</div>
            </button>
            <button class="style-option" data-style="outdoors" onclick="changeMapStyle('outdoors')">
                <svg class="style-preview" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <rect fill="#e8f4ea" width="100" height="100"/>
                    <path fill="#a8d5ba" d="M0,60 Q30,40 60,60 T100,50 V100 H0 Z"/>
                    <path fill="#52796f" d="M40,70 L45,60 L50,70 Z"/>
                </svg>
                <div class="style-label">Outdoors</div>
            </button>
        </div>
    </div>

    <div class="info-panel" id="infoPanel" style="display: none;">
        <div class="info-panel-header" id="infoPanelHeader" role="button" tabindex="0" aria-expanded="false" aria-controls="infoPanelBody">
            <h2><span id="propertyName">Property</span><a href="#" class="locate-link" id="locateLink">[Locate]</a></h2>
            <span class="info-panel-toggle" id="infoPanelToggle" aria-hidden="true">▼</span>
        </div>
        <div class="info-panel-body" id="infoPanelBody">
            <div class="detail"><strong>State:</strong> <span id="propertyState">-</span></div>
            <div class="detail"><strong>Polygons:</strong> <span id="polygonCount">0</span></div>
            <div class="detail" id="parcelNavBlock" style="display: none;">
                <strong>Navigate to parcel</strong><span class="new-badge" aria-label="New feature">New</span>
                <div class="parcel-nav-apps">
                    <a href="#" id="navGoogle" target="_blank" rel="noopener" class="parcel-nav-btn">Google Maps</a>
                    <a href="#" id="navApple" target="_blank" rel="noopener" class="parcel-nav-btn">Apple Maps</a>
                    <a href="#" id="navWaze" target="_blank" rel="noopener" class="parcel-nav-btn">Waze</a>
                </div>
            </div>
            <div id="creatorInfo" style="margin-top: 15px; display: none;">
                <div class="detail"><strong>Contact:</strong> <span id="creatorName">-</span></div>
                <div class="detail"><strong>Company:</strong> <span id="creatorCompany">-</span></div>
                <div class="detail"><strong>Phone:</strong> <span id="creatorPhone">-</span></div>
            </div>
        </div>
    </div>

    <div class="legend" id="legendBox">
        <div class="legend-item">
            <div class="legend-color" style="background: #667eea; border: 2px solid #4c5fd5;"></div>
            <span>Property Boundary</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #e74c3c;"></div>
            <span>Your Location</span>
        </div>
    </div>

    <button type="button" class="location-btn" id="locationBtn" aria-label="Center map on your location" title="Shows your position. After you tap, the map can follow you; drag the map to stop following.">
        📍 My Location
    </button>

    <div class="polygon-nav" id="polygonNav" aria-label="Navigate polygons">
        <button type="button" class="polygon-nav-btn" id="polygonNavPrev" title="Previous polygon" aria-label="Previous polygon">◀</button>
        <span class="polygon-nav-label" id="polygonNavLabel">Polygon 1 of 1</span>
        <button type="button" class="polygon-nav-btn" id="polygonNavNext" title="Next polygon" aria-label="Next polygon">▶</button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        (function() {
            // Bootleg analytics: Meadows Hale Parcel Locator Analytics form (event, page, user, extra).
            window.ANALYTICS = {
                enabled: true,
                formAction: 'https://docs.google.com/forms/d/e/1FAIpQLSfaul99ZR6UWw2TCZAhKlg0pDIXd1saLTpz0pVzV3u29SflKA/formResponse',

        function parcelLatLngFromPolygons(polygons) {
            var minLat = 90, maxLat = -90, minLng = 180, maxLng = -180, found = false;
            for (var p = 0; p < polygons.length; p++) {
                var outer = polygons[p][0];
                if (!outer || outer.length === 0) continue;
                for (var i = 0; i < outer.length; i++) {
                    var lng = outer[i][0], lat = outer[i][1];
                    if (typeof lat !== 'number' || typeof lng !== 'number' || isNaN(lat) || isNaN(lng)) continue;
                    found = true;
                    if (lat < minLat) minLat = lat;
                    if (lat > maxLat) maxLat = lat;
                    if (lng < minLng) minLng = lng;
                    if (lng > maxLng) maxLng = lng;
                }
            }
            if (!found) return null;
            return { lat: (minLat + maxLat) / 2, lng: (minLng + maxLng) / 2 };
        }

        function parcelNavPointFromApi(data, polygons) {
            var la = data.latitude, lo = data.longitude;
            if (la != null && lo != null && !isNaN(+la) && !isNaN(+lo)) {
                return { lat: +la, lng: +lo };
            }
            la = data.center_lat;
            lo = data.center_lng;
            if (la != null && lo != null && !isNaN(+la) && !isNaN(+lo)) {
                return { lat: +la, lng: +lo };
            }
            return parcelLatLngFromPolygons(polygons);
        }

        async function initMap() {
            var urlParams = new URLSearchParams(window.location.search);
            var contactParam = urlParams.get('contact');

                let landData = null;

                if (stored) {
                    const parsed = JSON.parse(stored);
                    if (parsed.mapId === mapId) landData = parsed;
                }

                if (!landData && mapId) {
                    const response = await fetch(`https://api.id.land/maps/${mapId}/share`);
                    if (!response.ok) throw new Error('Failed to fetch data');

                    const data = await response.json();
                    const polygons = data.geoJSON.filter(f => f.geometry && f.geometry.type === 'Polygon');
                    const ringCoords = polygons.map(p => p.geometry.coordinates);

                    landData = {
                        name: data.name || 'Property',
                        state: data.state || '',
                        polygons: ringCoords,
                        creator: data.creator || null,
                        mapId: mapId
                    };
                    var navPt = parcelNavPointFromApi(data, ringCoords);
                    if (navPt) {
                        landData.navLat = navPt.lat;
                        landData.navLng = navPt.lng;
                    }
                }

                if (landData && landData.polygons && landData.polygons.length > 0
                    && (landData.navLat == null || landData.navLng == null)) {
                    var fallbackPt = parcelLatLngFromPolygons(landData.polygons);
                    if (fallbackPt) {
                        landData.navLat = fallbackPt.lat;
                        landData.navLng = fallbackPt.lng;
                    }
                }

                if (!landData || !landData.polygons || landData.polygons.length === 0) {
                    throw new Error('No property data available');
                }

                map = L.map('map').setView([39.8283, -98.5794], 4);

                const preferredStyle = localStorage.getItem('preferredMapStyle') || 'streets';
                const style = mapStyles[preferredStyle];

                    attribution: style.attribution,
                    maxZoom: style.maxZoom,
                    subdomains: style.subdomains || 'abc'

                    const btn = document.querySelector(`[data-style="${preferredStyle}"]`);
                    if (btn) btn.classList.add('active');

                const allCoordinates = [];
                landData.polygons.forEach((polygonCoords, index) => {
                    const leafletCoords = polygonCoords[0].map(coord => [coord[1], coord[0]]);
                    allCoordinates.push(...leafletCoords);

                        color: '#4c5fd5',

                        weight: 3

                    polygon.bindPopup(`<strong>${landData.name}</strong><br>Polygon ${index + 1}`);
                    polygonLayers.push(polygon);

                if (allCoordinates.length > 0) {

                map.on('dragstart', function() {

        function applyUserCoords(lat, lng) {
            locLog('applyUserCoords in', { lat: lat, lng: lng, follow: followUserLocation, hasMap: !!map });
            var la = Number(lat);
            var lo = Number(lng);
            if (!Number.isFinite(la) || !Number.isFinite(lo) || Math.abs(la) > 90 || Math.abs(lo) > 180) {
                locLog('applyUserCoords: invalid coordinates, skip');
                return;
            }
            userLocation = [la, lo];
            if (!map) {
                locLog('applyUserCoords: abort (no map)');
                return;
            }
            if (userMarker) {
                userMarker.setLatLng(userLocation);
                if (typeof userMarker.setZIndexOffset === 'function') userMarker.setZIndexOffset(2000);
                locLog('applyUserCoords: moved existing marker', userLocation.slice());
            } else {
                userMarker = L.marker(userLocation, {
                    icon: userLocationDivIcon(),
                    zIndexOffset: 2000
                }).addTo(map);
                userMarker.bindPopup('<strong>📍 You are here</strong>');
                locLog('applyUserCoords: created new marker', userLocation.slice());
            }
            if (followUserLocation) {
                try {
                    map.panTo(userLocation, { animate: true, duration: 0.35, easeLinearity: 0.2 });
                    locLog('applyUserCoords: panTo ok, map center=', map.getCenter());
                } catch (panErr) {
                    console.error('[MH Loc] panTo failed', panErr);
                }
            }
        }

        function stopLocationWatch() {
            if (locationWatchId != null && 'geolocation' in navigator) {
                locLog('stopLocationWatch id=', locationWatchId);
                navigator.geolocation.clearWatch(locationWatchId);
                locationWatchId = null;
            }
        }

        function stopLocationPoll() {
            if (locationPollId != null) {
                locLog('stopLocationPoll id=', locationPollId);
                clearTimeout(locationPollId);
                locationPollId = null;
            }
        }

        /**
         * Many mobile browsers rarely fire watchPosition while moving. We poll getCurrentPosition,
         * but only one request at a time: overlapping calls (interval + "My Location") can starve
         * iOS Safari so the button stays on "Locating…" and never draws a marker.
         */
        function startLocationPoll() {
            stopLocationPoll();
            if (!('geolocation' in navigator) || !map) return;
            var pollDelayMs = 3500;
            function scheduleNext(ms) {
                if (locationPollId != null) clearTimeout(locationPollId);
                locationPollId = setTimeout(tick, ms);
            }
            function tick() {
                if (!map || !('geolocation' in navigator)) {
                    locLog('poll tick: skip (no map or geolocation)');
                    return;
                }
                if (document.visibilityState !== 'visible') {
                    locLog('poll tick: tab hidden, reschedule');
                    scheduleNext(pollDelayMs);
                    return;
                }
                if (locatingButtonActive) {
                    locLog('poll tick: locatingButtonActive, reschedule 800ms');
                    scheduleNext(800);
                    return;
                }
                locLog('poll tick: getCurrentPosition…');
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        locLog('poll: success', pos.coords.latitude, pos.coords.longitude, 'acc=', pos.coords.accuracy);
                        applyUserCoords(pos.coords.latitude, pos.coords.longitude);
                        scheduleNext(pollDelayMs);
                    },
                    function(err) {
                        locLog('poll: error', err && err.code, err && err.message);
                        scheduleNext(pollDelayMs);
                    },
                    { enableHighAccuracy: true, maximumAge: 5000, timeout: 12000 }
                );
            }
            locLog('startLocationPoll: first schedule in 2000ms');
            scheduleNext(2000);
        }

        function getUserLocation() {
            var hint = document.getElementById('locationHint');
            locLog('getUserLocation() called');
            if (!('geolocation' in navigator)) {
                locLog('getUserLocation: no geolocation API');
                if (hint) {
                    hint.textContent = 'Location is not supported by this browser.';
                    hint.classList.add('location-error');
                }
                return;
            }
            if (hint) {
                hint.textContent = 'Tracking your location…';
                hint.classList.remove('location-error');
            }
            stopLocationWatch();
            stopLocationPoll();
            locationWatchId = navigator.geolocation.watchPosition(
                function(position) {
                    locLog('watch: success', position.coords.latitude, position.coords.longitude, 'acc=', position.coords.accuracy);
                    applyUserCoords(position.coords.latitude, position.coords.longitude);
                    if (hint) hint.textContent = 'Your location updates as you move.';
                },
                function(error) {
                    locLog('watch: error', error.code, error.message);
                    stopLocationWatch();
                    stopLocationPoll();
                    if (hint) {
                        hint.classList.add('location-error');
                        if (error.code === 1) {
                            hint.textContent = 'Location denied. Tap "My Location" to allow and try again.';
                        } else if (error.code === 3 || error.code === 2) {
                            hint.textContent = 'Location unavailable. Tap "My Location" to try again.';
                        } else {
                            hint.textContent = 'Could not get location. Tap "My Location" to try again.';
                        }
                    }
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 0
                    /* no timeout: a finite timeout can fire watch error and stop updates on some devices */
                }
            );
            locLog('watchPosition returned id=', locationWatchId, 'typeof=', typeof locationWatchId);
            startLocationPoll();
        }

        function hasActiveLocationWatch() {
            /* Use != null so id 0 (valid on some engines) is still "active" */
            return locationWatchId != null;
        }

        function hasActiveLocationPoll() {
            return locationPollId != null;
        }

        function finishLocatingButton(btn, prevLabel) {
            locLog('finishLocatingButton', { follow: followUserLocation, prevLabel: prevLabel });
            locatingButtonActive = false;
            if (btn) {
                btn.disabled = false;
                if (followUserLocation) syncLocationButtonLabel();
                else if (prevLabel && prevLabel !== 'Locating…') btn.textContent = prevLabel;
                else syncLocationButtonLabel();
            }
        }

        function centerOnUserLocation() {
            if (window.logEvent) window.logEvent('my_location', 'client', '', (document.getElementById('propertyName') && document.getElementById('propertyName').textContent) || '');
            locLog('centerOnUserLocation click', {
                hasMap: !!map,
                userLocation: userLocation ? userLocation.slice() : null,
                follow: followUserLocation,
                locatingButtonActive: locatingButtonActive,
                watchId: locationWatchId,
                pollId: locationPollId,
                hasWatch: hasActiveLocationWatch(),
                hasPoll: hasActiveLocationPoll()
            });
            if (!map) {
                locLog('centerOnUserLocation: abort (no map)');
                return;
            }
            var btn = document.getElementById('locationBtn');
            var prevLabel = btn ? btn.textContent : '📍 My Location';
            if (locatingButtonActive || (btn && btn.textContent === 'Locating…')) {
                locatingButtonActive = false;
                if (btn) btn.disabled = false;
                syncLocationButtonLabel();
                prevLabel = btn ? btn.textContent : '📍 My Location';
                locLog('centerOnUserLocation: recovered stuck Locating state, prevLabel=', prevLabel);
            }
            var lat0 = userLocation && userLocation.length === 2 ? Number(userLocation[0]) : NaN;
            var lng0 = userLocation && userLocation.length === 2 ? Number(userLocation[1]) : NaN;
            var hasValidCachedCoords = Number.isFinite(lat0) && Number.isFinite(lng0)
                && Math.abs(lat0) <= 90 && Math.abs(lng0) <= 180;
            if (hasValidCachedCoords) {
                locLog('branch: valid cached coords → follow + marker + setView');
                locatingButtonActive = false;
                followUserLocation = true;
                applyUserCoords(lat0, lng0);
                map.setView(userLocation, Math.max(map.getZoom(), 15));
                if (userMarker) userMarker.openPopup();
                syncLocationButtonLabel();
                return;
            }
            if (!('geolocation' in navigator)) {
                locLog('centerOnUserLocation: no geolocation');
                return;
            }
            locatingButtonActive = true;
            locLog('branch: getCurrentPosition… prevLabel=', prevLabel);
            if (btn) {
                btn.disabled = true;
                btn.textContent = 'Locating…';
            }
            var safetyTimer = setTimeout(function() {
                locLog('safetyTimer: 22s fired, forcing button reset');
                finishLocatingButton(btn, prevLabel);
            }, 22000);
            var geoOpts = { enableHighAccuracy: true, maximumAge: 30000, timeout: 18000 };
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    clearTimeout(safetyTimer);
                    locLog('getCurrentPosition: SUCCESS', position.coords.latitude, position.coords.longitude, 'acc=', position.coords.accuracy);
                    try {
                        followUserLocation = true;
                        applyUserCoords(position.coords.latitude, position.coords.longitude);
                        map.setView(userLocation, Math.max(map.getZoom(), 15));
                        if (userMarker) userMarker.openPopup();
                        locLog('after setView', { center: map.getCenter(), zoom: map.getZoom(), hasMarker: !!userMarker });
                        if (!hasActiveLocationWatch() && !hasActiveLocationPoll()) {
                            locLog('starting getUserLocation (no watch/poll)');
                            getUserLocation();
                        } else if (!hasActiveLocationPoll()) {
                            locLog('starting startLocationPoll only');
                            startLocationPoll();
                        } else {
                            locLog('watch/poll already active; skip restart');
                        }
                    } catch (err) {
                        console.error('[MH Loc] getCurrentPosition success handler', err);
                    } finally {
                        finishLocatingButton(btn, prevLabel);
                    }
                },
                function(err) {
                    clearTimeout(safetyTimer);
                    locLog('getCurrentPosition: ERROR', err && err.code, err && err.message);
                    try {
                        getUserLocation();
                    } catch (e) {
                        console.error('[MH Loc] getUserLocation after error', e);
                    } finally {
                        finishLocatingButton(btn, prevLabel);
                    }
                },
                geoOpts
            );
        }

        function bindLocationButtonOnce() {
            var locBtn = document.getElementById('locationBtn');
            if (!locBtn || locBtn.dataset.mhLocBound === '1') return;
            locBtn.dataset.mhLocBound = '1';
            locBtn.addEventListener('click', function(e) {
                e.preventDefault();
                locLog('locationBtn click');
                centerOnUserLocation();
            });
        }

        window.addEventListener('load', function() {
            if (window.logEvent) window.logEvent('pageview', 'client', '', '');
            initMap();
        });
        /* iOS Safari: avoid an extra getCurrentPosition on every tab focus (overlaps watch/poll). Poll resumes on next tick. */
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible' && map) locLog('visibility: tab visible (poll/watch will refresh; no extra geo call)');
        });
        window.addEventListener('beforeunload', function() {
            locLog('beforeunload: stop watch/poll');
            stopLocationWatch();
            stopLocationPoll();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meadows-Hale - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.95em;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .example {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .share-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .share-btn, .download-link {
            display: inline-block;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 1em;
            font-family: inherit;
        }

        .share-btn:hover, .download-link:hover {
            background: #5568d3;
            color: white;
        }

        .download-link {
            background: #6c757d;
        }

        .download-link:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌲 Meadows-Hale</h1>
        <p class="subtitle">Admin Portal - Generate Standalone Property Map</p>

        <form id="landForm">
            <div class="form-group">
                <label for="landUrl">Land ID URL</label>
                <input 
                    type="text" 
                    id="landUrl" 
                    name="landUrl" 
                    placeholder="https://id.land/maps/..." 
                    required
                />
                <div class="example">
                    <strong>Example:</strong><br>
                    https://id.land/maps/db72d71ef72e192c30e66256e0cf6fc5/share
                </div>
            </div>

            <button type="submit" id="submitBtn">
                Generate Standalone HTML File
            </button>
        </form>

        <div id="status" class="status"></div>
    </div>

    <script>
        var form = document.getElementById('landForm');
        var submitBtn = document.getElementById('submitBtn');
        var statusDiv = document.getElementById('status');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            var landUrl = document.getElementById('landUrl').value.trim();

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loader"></span>Processing...';
            statusDiv.style.display = 'none';

            try {
                const urlMatch = landUrl.match(/maps\/([a-f0-9]+)\/share/);
                if (!urlMatch) throw new Error('Invalid URL format');

                const apiUrl = 'https://api.id.land/maps/' + urlMatch[1] + '/share';
                statusDiv.className = 'status info';
                statusDiv.innerHTML = 'Fetching property data...';
                statusDiv.style.display = 'block';

                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Failed to fetch data');

                const data = await response.json();
                if (!data.geoJSON || data.geoJSON.length === 0) throw new Error('No polygon data found');

                const polygons = data.geoJSON.filter(f => f.geometry && f.geometry.type === 'Polygon');
                if (polygons.length === 0) throw new Error('No valid polygons found');

                statusDiv.innerHTML = 'Generating HTML file...';

                const templateResponse = await fetch('client.html');
                const templateHtml = await templateResponse.text();

                const landData = {
                    name: data.name || 'Property',
                    state: data.state || 'N/A',
                    polygons: polygons.map(p => p.geometry.coordinates),
                    creator: data.creator || null
                };

                const bundled = templateHtml.replace(
                    'async function initMap() {',
                    'window.LAND_DATA=' + JSON.stringify(landData) + ';async function initMap() {if(window.LAND_DATA){const landData=window.LAND_DATA;try{map=L.map("map").setView([39.8,-98.6],4);const s=mapStyles.streets;currentTileLayer=L.tileLayer(s.url,{attribution:s.attribution,maxZoom:s.maxZoom,subdomains:"abc"}).addTo(map);const ac=[];landData.polygons.forEach((pc,i)=>{const lc=pc[0].map(c=>[c[1],c[0]]);ac.push(...lc);L.polygon(lc,{color:"#4c5fd5",fillColor:"#667eea",fillOpacity:0.3,weight:3}).addTo(map).bindPopup("<strong>"+landData.name+"</strong><br>Polygon "+(i+1));});if(ac.length>0)map.fitBounds(L.latLngBounds(ac),{padding:[50,50]});document.getElementById("propertyName").textContent=landData.name;document.getElementById("propertyState").textContent=landData.state;document.getElementById("polygonCount").textContent=landData.polygons.length;if(landData.creator){document.getElementById("creatorInfo").style.display="block";document.getElementById("creatorName").textContent=landData.creator.full_name||"N/A";document.getElementById("creatorCompany").textContent=landData.creator.company||"N/A";document.getElementById("creatorPhone").textContent=landData.creator.formatted_phone||"N/A";}document.getElementById("infoPanel").style.display="block";getUserLocation();document.getElementById("loadingOverlay").classList.add("hidden");}catch(e){console.error(e);document.getElementById("loadingOverlay").innerHTML="<div class=\\"error-message\\"><h2>Error</h2><p>"+e.message+"</p></div>";}return;}'
                );

                const blob = new Blob([bundled], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const filename = (data.name || 'property').replace(/[^a-z0-9]/gi, '_').toLowerCase() + '_map.html';
                const file = new File([blob], filename, { type: 'text/html' });

                statusDiv.className = 'status success';
                statusDiv.innerHTML = '<strong>✓ Success!</strong><br><br>' +
                    '<strong>Property:</strong> ' + landData.name + '<br>' +
                    '<strong>Polygons:</strong> ' + polygons.length + '<br><br>' +
                    '<div class="share-actions">' +
                    '<button type="button" id="shareBtn" class="share-btn">📤 Share</button>' +
                    '<a href="' + url + '" download="' + filename + '" class="download-link">📥 Download</a>' +
                    '</div>' +
                    '<br><small style="color:#666;">Share opens Email, Messages, etc. on macOS.</small>';
                statusDiv.style.display = 'block';

                var shareBtn = document.getElementById('shareBtn');
                if (shareBtn && navigator.share) {
                    shareBtn.onclick = function() {
                        var shareData = {
                            title: landData.name + ' - Property Map',
                            text: 'Property map: ' + landData.name + (landData.state !== 'N/A' ? ' (' + landData.state + ')' : ''),
                            files: [file]
                        };
                        if (navigator.canShare && navigator.canShare(shareData)) {
                            navigator.share(shareData).then(function() {
                                shareBtn.textContent = '✓ Shared';
                            }).catch(function(err) {
                                if (err.name !== 'AbortError') {
                                    window.open(url);
                                }
                            });
                        } else {
                            window.open(url);
                        }
                    };
                } else if (shareBtn) {
                    shareBtn.textContent = '📥 Download instead';
                    shareBtn.onclick = function() {
                        var a = document.createElement('a');
                        a.href = url;
                        a.download = filename;
                        a.click();
                    };
                }

            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '<strong>✗ Error:</strong> ' + error.message;
                statusDiv.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Generate Standalone HTML File';
            }
        });
    </script>
</body>
</html>

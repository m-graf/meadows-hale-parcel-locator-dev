<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Meadows-Hale - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .beta-tag {
            display: inline-block;
            margin-left: 10px;
            padding: 4px 10px;
            font-size: 0.5em;
            font-weight: 600;
            vertical-align: middle;
            text-decoration: none;
            color: #667eea;
            background: #e8ecff;
            border-radius: 999px;
            transition: background 0.2s, color 0.2s;
        }
        .beta-tag:hover {
            background: #667eea;
            color: white;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.95em;
            display: none;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .example {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .share-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .share-btn {
            display: inline-block;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 1em;
            font-family: inherit;
        }

        .share-btn:hover {
            background: #5568d3;
            color: white;
        }

        #loginForm .form-group:last-of-type { margin-bottom: 20px; }
        input[type="password"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .login-error { margin-top: 12px; color: #721c24; font-size: 0.9em; display: none; }
        .login-error.visible { display: block; }
        #logoutWrap { text-align: right; margin-bottom: 10px; }
        #logoutWrap a { color: rgba(255,255,255,0.9); font-size: 0.9em; text-decoration: none; }
        #logoutWrap a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            body {
                padding: 12px;
                align-items: flex-start;
                min-height: 100vh;
            }
            .container {
                padding: 24px;
                border-radius: 16px;
                max-width: 100%;
            }
            h1 { font-size: 1.6em; }
            .subtitle { font-size: 0.9em; margin-bottom: 20px; }
            input[type="text"],
            input[type="password"] {
                padding: 12px;
                font-size: 16px;
                min-width: 0;
            }
            button { padding: 14px; font-size: 1em; }
            .status { padding: 12px; font-size: 0.9em; }
            .example { padding: 12px; font-size: 0.85em; }
            .share-actions { flex-direction: column; }
            .share-btn { display: block; text-align: center; }
            #logoutWrap { padding: 0 12px; margin-bottom: 8px; }
        }
    </style>
</head>
<body>
    <!-- Auth: only hashes are stored. Replace AUTH in the script with your own salt + SHA-256(salt+username) and SHA-256(salt+password) for production. -->
    <div id="loginForm" class="container">
        <h1>🌲 Meadows-Hale <a href="#" target="_blank" rel="noopener" class="beta-tag">Beta</a></h1>
        <p class="subtitle">Admin – sign in</p>
        <form id="authForm">
            <div class="form-group">
                <label for="authUser">Username</label>
                <input type="text" id="authUser" name="username" autocomplete="username" required />
            </div>
            <div class="form-group">
                <label for="authPass">Password</label>
                <input type="password" id="authPass" name="password" autocomplete="current-password" required />
            </div>
            <p id="loginError" class="login-error">Invalid username or password.</p>
            <button type="submit">Log in</button>
        </form>
    </div>

    <div id="adminContent" style="display: none;">
        <div id="logoutWrap"><a href="#" id="logoutLink">Log out</a></div>
        <div class="container">
        <h1>🌲 Meadows-Hale <a href="#" target="_blank" rel="noopener" class="beta-tag">Beta</a></h1>
        <p class="subtitle">Admin Portal - Get shareable client link</p>

        <form id="landForm">
            <div class="form-group">
                <label for="landUrl">Land ID URL</label>
                <input 
                    type="text" 
                    id="landUrl" 
                    name="landUrl" 
                    placeholder="https://id.land/maps/..." 
                    required
                />
                <div class="example">
                    <strong>Example:</strong><br>
                    https://id.land/maps/db72d71ef72e192c30e66256e0cf6fc5/share
                </div>
            </div>

            <button type="submit" id="submitBtn">
                Get shareable link
            </button>
        </form>

        <div id="status" class="status"></div>
        </div>
    </div>

    <script>
        (function() {
            var APP_VERSION = '1.0.3';
            var FEEDBACK_VERSION_ENTRY_ID = '1369032985';
            var feedbackBase = 'https://docs.google.com/forms/d/e/1FAIpQLSeZ2qftB2jO16KWfD_ODNTtQn-Nv80IkU3GxVPgAuZIpFGb8A/viewform?usp=pp_url';
            var feedbackUrl = feedbackBase + (FEEDBACK_VERSION_ENTRY_ID ? ('&entry.' + FEEDBACK_VERSION_ENTRY_ID + '=' + encodeURIComponent(APP_VERSION)) : '');
            document.querySelectorAll('.beta-tag').forEach(function(a) { a.href = feedbackUrl; });
        })();
        (function() {
            var AUTH = {
                salt: '9c642f0a-4071-4790-8ef2-a680cfe930d6',
                userHash: '03416b6d64e3ff7a5a9b597e1643f2a3a23132ba2af056d3768f4a5b99733985',
                passHash: '5e5e43d6d2a77dfc8b624fc7b7745bdbb6bedcbff5e325998ac148ac6e5ec3d0'
            };
            function bufToHex(buf) {
                return Array.from(new Uint8Array(buf)).map(function(b) { return ('0' + b.toString(16)).slice(-2); }).join('');
            }
            function sha256Hex(str) {
                return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)).then(function(buf) { return bufToHex(buf); });
            }
            function checkAuth() {
                if (sessionStorage.getItem('admin_authenticated') === '1') {
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('adminContent').style.display = 'block';
                    return true;
                }
                return false;
            }
            if (checkAuth()) {
                document.getElementById('logoutLink').onclick = function(e) {
                    e.preventDefault();
                    sessionStorage.removeItem('admin_authenticated');
                    location.reload();
                };
            } else {
                document.getElementById('authForm').onsubmit = async function(e) {
                    e.preventDefault();
                    var user = (document.getElementById('authUser').value || '').trim();
                    var pass = document.getElementById('authPass').value || '';
                    var errEl = document.getElementById('loginError');
                    errEl.classList.remove('visible');
                    try {
                        var uHash = await sha256Hex(AUTH.salt + user);
                        var pHash = await sha256Hex(AUTH.salt + pass);
                        if (uHash === AUTH.userHash && pHash === AUTH.passHash) {
                            sessionStorage.setItem('admin_authenticated', '1');
                            location.reload();
                        } else {
                            errEl.classList.add('visible');
                        }
                    } catch (err) {
                        errEl.classList.add('visible');
                    }
                };
            }
        })();
        var form = document.getElementById('landForm');
        var submitBtn = document.getElementById('submitBtn');
        var statusDiv = document.getElementById('status');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            var landUrl = document.getElementById('landUrl').value.trim();

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loader"></span>Processing...';
            statusDiv.style.display = 'none';

            try {
                const urlMatch = landUrl.match(/maps\/([a-f0-9]+)\/share/);
                if (!urlMatch) throw new Error('Invalid URL format');

                const apiUrl = 'https://api.id.land/maps/' + urlMatch[1] + '/share';
                statusDiv.className = 'status info';
                statusDiv.innerHTML = 'Fetching property data...';
                statusDiv.style.display = 'block';

                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Failed to fetch data');

                const data = await response.json();
                if (!data.geoJSON || data.geoJSON.length === 0) throw new Error('No polygon data found');

                const polygons = data.geoJSON.filter(f => f.geometry && f.geometry.type === 'Polygon');
                if (polygons.length === 0) throw new Error('No valid polygons found');

                var propertyName = data.name || 'Property';
                var propertyState = data.state || 'N/A';

                var baseUrl = window.location.origin + window.location.pathname.replace(/\/admin(\.html)?\/?$/, '').replace(/\/?$/, '/');
                var shareableLink = baseUrl + 'client.html?map=' + urlMatch[1];

                statusDiv.className = 'status success';
                statusDiv.innerHTML = '<strong>✓ Success!</strong><br><br>' +
                    '<strong>Property:</strong> ' + propertyName + '<br>' +
                    '<strong>Polygons:</strong> ' + polygons.length + '<br><br>' +
                    '<div class="share-actions">' +
                    '<button type="button" id="copyLinkBtn" class="share-btn">🔗 Copy link</button>' +
                    '<button type="button" id="shareBtn" class="share-btn">📤 Share link</button>' +
                    '</div>' +
                    '<small style="display:block;margin-top:10px;color:#666;" id="shareHint"></small>';
                statusDiv.style.display = 'block';

                function copyLink() {
                    navigator.clipboard.writeText(shareableLink).then(function() {
                        var btn = document.getElementById('copyLinkBtn');
                        if (btn) { btn.textContent = '✓ Copied!'; setTimeout(function() { btn.textContent = '🔗 Copy link'; }, 2000); }
                    });
                }

                var copyLinkBtn = document.getElementById('copyLinkBtn');
                if (copyLinkBtn) copyLinkBtn.onclick = copyLink;

                var shareBtn = document.getElementById('shareBtn');
                var shareHint = document.getElementById('shareHint');
                if (shareBtn) {
                    shareBtn.onclick = function() {
                        var shareData = {
                            title: propertyName + ' - Property Map',
                            text: 'Property map: ' + propertyName + (propertyState !== 'N/A' ? ' (' + propertyState + ')' : ''),
                            url: shareableLink
                        };
                        if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
                            navigator.share(shareData).then(function() {
                                shareBtn.textContent = '✓ Shared';
                            }).catch(function(err) {
                                if (err.name !== 'AbortError' && shareHint) shareHint.textContent = 'Share cancelled or failed.';
                            });
                        } else {
                            copyLink();
                            if (shareHint) shareHint.textContent = 'Link copied to clipboard — paste it in Mail or Messages to share.';
                        }
                    };
                }

            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '<strong>✗ Error:</strong> ' + error.message;
                statusDiv.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Get shareable link';
            }
        });
    </script>
</body>
</html>
